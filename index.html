<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pixel Agency</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated}
:root{
  --bg:#0d0d1a;--bg2:#12122a;--bg3:#1a1a3a;
  --border:#2a2a5a;--border2:#3a3a7a;
  --green:#00ff88;--yellow:#ffcc00;--blue:#44aaff;--pink:#ff44cc;--red:#ff4444;
  --text:#ccd;--text2:#778899;--text3:#445566;
}
body{background:var(--bg);color:var(--text);font-family:'Press Start 2P',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column;font-size:10px}
.scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:999}

/* TOP BAR */
.topbar{background:var(--bg2);border-bottom:2px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.logo{font-size:12px;color:var(--green);letter-spacing:3px;text-shadow:0 0 10px var(--green)}
.top-pills{display:flex;gap:8px;margin-left:auto}
.pill{font-size:7px;padding:3px 8px;border:1px solid;border-radius:2px}
.pill-g{border-color:var(--green);color:var(--green)}
.pill-y{border-color:var(--yellow);color:var(--yellow)}
.pill-b{border-color:var(--blue);color:var(--blue);animation:none}
.pill-r{border-color:var(--red);color:var(--red)}
#modelPill{font-size:7px;padding:3px 8px;border:1px solid var(--border2);color:var(--text2)}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;gap:0}

/* OFFICE */
.office-wrap{flex:1;position:relative;overflow:hidden}
#officeCanvas{display:block}

/* SIDE */
.side{width:300px;background:var(--bg2);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.side-tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:8px 4px;font-size:7px;text-align:center;cursor:pointer;color:var(--text3);border-right:1px solid var(--border)}
.tab:last-child{border-right:none}
.tab.active{color:var(--green);background:var(--bg3);border-bottom:2px solid var(--green)}
.tab-content{display:none;flex:1;overflow-y:auto;flex-direction:column}
.tab-content.active{display:flex}
.tab-content::-webkit-scrollbar{width:3px}.tab-content::-webkit-scrollbar-thumb{background:var(--border2)}

.section{padding:10px;border-bottom:1px solid var(--border)}
.section-title{font-size:7px;color:var(--text3);letter-spacing:1px;margin-bottom:8px}

/* INPUTS */
input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--blue);font-family:'Press Start 2P',monospace;font-size:7px;padding:5px 7px;outline:none;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 6px rgba(68,170,255,0.2)}
.irow{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.irow label{font-size:6px;color:var(--text3);min-width:65px;flex-shrink:0}
.irow input,.irow select{flex:1;min-width:0}
textarea{resize:none;height:56px;line-height:1.8}

/* BUTTONS */
.btn{font-family:'Press Start 2P',monospace;font-size:7px;padding:7px 10px;cursor:pointer;border:2px solid;width:100%;margin-bottom:5px;letter-spacing:1px;transition:all .1s;position:relative}
.btn::after{content:'';position:absolute;bottom:-3px;right:-3px;width:100%;height:100%;z-index:-1}
.btn-g{background:var(--bg);color:var(--green);border-color:var(--green)}
.btn-g::after{border:2px solid rgba(0,255,136,0.3)}
.btn-g:hover{background:rgba(0,255,136,0.1);box-shadow:0 0 10px rgba(0,255,136,0.3)}
.btn-g:active{transform:translate(1px,1px)}
.btn-g:disabled{color:var(--text3);border-color:var(--border);cursor:not-allowed;box-shadow:none}
.btn-y{background:var(--bg);color:var(--yellow);border-color:var(--yellow)}
.btn-y:hover{background:rgba(255,204,0,0.1)}
.btn-b{background:var(--bg);color:var(--blue);border-color:var(--blue)}
.btn-b:hover{background:rgba(68,170,255,0.1)}
.btn-r{background:var(--bg);color:var(--text3);border-color:var(--border)}
.btn-r:hover{background:var(--bg3)}

/* PROGRESS */
.prog{margin:6px 0}
.prog-label{font-size:6px;color:var(--text3);margin-bottom:3px}
.prog-track{height:6px;background:var(--bg);border:1px solid var(--border)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .4s;width:0%}

/* AGENTS */
.agent-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid rgba(42,42,90,0.5);cursor:pointer;transition:background .1s}
.agent-row:hover{background:var(--bg3)}
.agent-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0;transition:all .2s}
.dot-idle{background:var(--border2)}
.dot-active{background:var(--yellow);box-shadow:0 0 8px var(--yellow);animation:dp .4s infinite alternate}
.dot-done{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot-error{background:var(--red)}
@keyframes dp{from{opacity:.3}to{opacity:1}}
.agent-row-name{font-size:7px;color:var(--text)}
.agent-row-status{font-size:6px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

/* LOG */
.log{font-size:6px;line-height:2;padding:8px 10px;color:var(--text3)}
.ls{color:var(--green)}.le{color:var(--red)}.ln{color:var(--blue)}.lw{color:var(--yellow)}

/* RESULT */
.result-section{padding:10px;display:none;flex-direction:column;gap:6px;flex:1}
.result-title{font-size:8px;color:var(--green);letter-spacing:1px;text-shadow:0 0 6px var(--green)}
.result-text{font-size:6px;color:var(--text2);line-height:1.9;white-space:pre-wrap;flex:1;overflow-y:auto;background:var(--bg);border:1px solid var(--border);padding:8px;max-height:260px}
.result-text::-webkit-scrollbar{width:3px}.result-text::-webkit-scrollbar-thumb{background:var(--border2)}

/* LANDING PREVIEW */
#landingPreview{display:none;flex:1;overflow:hidden;flex-direction:column}
.preview-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:4px 8px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.preview-bar span{font-size:6px;color:var(--text3)}
#landingFrame{width:100%;flex:1;border:none;background:#fff}
</style>
</head>
<body>
<div class="scanlines"></div>

<div class="topbar">
  <span class="logo">★ PIXEL AGENCY ★</span>
  <span style="font-size:6px;color:var(--text3)">// 9 AI AGENTS // PRODUCES REAL LANDING PAGES //</span>
  <div class="top-pills">
    <span class="pill pill-g" id="statusPill">STANDBY</span>
    <span id="modelPill">нет модели</span>
  </div>
</div>

<div class="main">
  <!-- OFFICE CANVAS -->
  <div class="office-wrap">
    <canvas id="officeCanvas"></canvas>
    <div id="landingPreview">
      <div class="preview-bar">
        <span>★ ГОТОВЫЙ ЛЕНДИНГ ★</span>
        <button class="btn btn-b" style="width:auto;padding:3px 8px;margin:0;font-size:6px" onclick="closeLanding()">← НАЗАД</button>
        <button class="btn btn-g" style="width:auto;padding:3px 8px;margin:0;font-size:6px" onclick="downloadLanding()">↓ СКАЧАТЬ HTML</button>
      </div>
      <iframe id="landingFrame"></iframe>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side">
    <div class="side-tabs">
      <div class="tab active" onclick="switchTab('setup')">НАСТРОЙКА</div>
      <div class="tab" onclick="switchTab('team')">КОМАНДА</div>
      <div class="tab" onclick="switchTab('log')">ЛОГ</div>
      <div class="tab" onclick="switchTab('result')">РЕЗУЛЬТАТ</div>
    </div>

    <!-- SETUP TAB -->
    <div class="tab-content active" id="tab-setup">
      <div class="section">
        <div class="section-title">// API КЛЮЧИ (авто-переключение при лимите)</div>
        <div class="irow"><label>Groq:</label><input type="password" id="groqKey" placeholder="gsk_... (бесплатно)"></div>
        <div class="irow"><label>OpenRouter:</label><input type="password" id="orKey" placeholder="sk-or-... (бесплатно)"></div>
        <div class="irow"><label>Mistral:</label><input type="password" id="mistralKey" placeholder="необязательно"></div>
        <div class="irow"><label>Ollama:</label><input type="text" id="ollamaUrl" value="http://localhost:11434"></div>
        <div class="irow"><label>Модель:</label>
          <select id="groqModel">
            <option value="llama-3.3-70b-versatile">llama-3.3-70b</option>
            <option value="llama-3.1-8b-instant">llama-3.1-8b (быстро)</option>
            <option value="mixtral-8x7b-32768">mixtral-8x7b</option>
          </select>
        </div>
        <button class="btn btn-b" onclick="testConn()">⚡ ПРОВЕРИТЬ КЛЮЧ</button>
      </div>
      <div class="section" style="flex:1">
        <div class="section-title">// ЗАДАНИЕ ДЛЯ КОМАНДЫ</div>
        <textarea id="taskInput" placeholder="Опиши что нужно создать...&#10;Например: лендинг для фитнес-клуба, сайт кофейни, страница продукта..."></textarea>
        <div class="prog" id="progWrap">
          <div class="prog-label" id="progLabel">// STANDBY</div>
          <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
        </div>
        <button class="btn btn-g" id="runBtn" onclick="runAll()">▶ СОЗДАТЬ ЛЕНДИНГ</button>
        <button class="btn btn-r" onclick="resetAll()">↺ СБРОС</button>
      </div>
    </div>

    <!-- TEAM TAB -->
    <div class="tab-content" id="tab-team">
      <div id="agentsList"></div>
    </div>

    <!-- LOG TAB -->
    <div class="tab-content" id="tab-log">
      <div class="log" id="logBox"></div>
    </div>

    <!-- RESULT TAB -->
    <div class="tab-content" id="tab-result">
      <div class="result-section" id="resultSection">
        <div class="result-title">★ ОТЧЁТ КОМАНДЫ ★</div>
        <div class="result-text" id="resultText"></div>
        <button class="btn btn-g" onclick="copyResult()">КОПИРОВАТЬ ОТЧЁТ</button>
        <button class="btn btn-y" onclick="showLanding()">🌐 ОТКРЫТЬ ЛЕНДИНГ</button>
        <button class="btn btn-b" onclick="downloadLanding()">↓ СКАЧАТЬ HTML</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  AGENTS CONFIG
// ═══════════════════════════════════════════════════
const AGENTS = [
  {id:'seo', name:'SEO Менеджер', icon:'👔', color:'#ffcc00',
   desc:'координатор проекта',
   prompt:(task,p)=>`Ты опытный SEO менеджер. Задача: "${task}".
Дай краткий план (150 слов): структура лендинга (7-8 секций), ключевые слова, целевая аудитория, главный оффер, CTA. Только конкретика.`},

  {id:'copywriter', name:'Копирайтер', icon:'✍️', color:'#ffaa44',
   desc:'тексты и заголовки',
   prompt:(task,p)=>`Ты топ копирайтер. Задача: "${task}". SEO план: ${p.seo||''}.
Напиши все тексты для лендинга (200 слов): главный заголовок H1, подзаголовок, 4 блока преимуществ с иконками и текстом, 3 отзыва клиентов, текст CTA кнопки, футер.`},

  {id:'designer', name:'Дизайнер', icon:'🎨', color:'#ff44cc',
   desc:'стиль и визуал',
   prompt:(task,p)=>`Ты креативный веб-дизайнер. Задача: "${task}".
Опиши дизайн-систему (150 слов): главный цвет и акцент (конкретные hex), фоновый цвет, шрифт, стиль кнопок, стиль карточек, анимации, общее настроение. Дай готовые CSS переменные.`},

  {id:'analyst', name:'Аналитик', icon:'📊', color:'#44ffaa',
   desc:'данные и метрики',
   prompt:(task,p)=>`Ты аналитик. Задача: "${task}".
Напиши JSON структуру (150 слов) для лендинга: объект с полями hero (заголовок, подзаголовок, cta), features (массив из 4 элементов), testimonials (3 отзыва), stats (3 числовые метрики). Только JSON без лишнего текста.`},

  {id:'developer', name:'Верстальщик', icon:'💻', color:'#44aaff',
   desc:'создаёт HTML лендинг',
   prompt:(task,p)=>`Ты senior фронтенд разработчик. Задача: "${task}".
Данные: тексты: ${p.copywriter||''} | дизайн: ${p.designer||''} | данные: ${p.analyst||''}.
Напиши ПОЛНЫЙ готовый HTML лендинг одним файлом. Требования:
- Современный красивый дизайн с градиентами
- Секции: hero с большим заголовком, преимущества (4 карточки), статистика (3 числа), отзывы (3 карточки), CTA секция, футер
- CSS внутри <style> тега — анимации, hover эффекты, адаптивность
- Никаких внешних зависимостей
- Начни с <!DOCTYPE html> и закончи </html>
Верни ТОЛЬКО HTML код без объяснений.`},

  {id:'seo_tech', name:'SEO Техник', icon:'🔍', color:'#aaffcc',
   desc:'мета и оптимизация',
   prompt:(task,p)=>`Ты SEO специалист. Задача: "${task}".
Дополни HTML лендинг (уже готов): добавь в <head> правильные мета-теги (title, description, keywords, og:title, og:description), schema.org разметку, и в конец <body> добавь скрипт для базовой аналитики (console.log события). Верни только список добавлений в виде HTML кода.`},

  {id:'support', name:'Тех.поддержка', icon:'🔧', color:'#aa44ff',
   desc:'форма и интеграции',
   prompt:(task,p)=>`Ты специалист по интеграциям. Задача: "${task}".
Напиши HTML код для: 1) красивой формы захвата лида (имя + телефон + кнопка) с валидацией на JS, 2) всплывающего попапа с успешной отправкой, 3) обработчика formsubmit.co или аналога. Только готовый HTML+JS код.`},

  {id:'pdf_agent', name:'PDF Агент', icon:'📄', color:'#ff6644',
   desc:'документация',
   prompt:(task,p)=>`Ты специалист по документации. Задача: "${task}".
Создай текстовый шаблон коммерческого предложения (200 слов) на основе лендинга: заголовок, описание продукта/услуги, 5 ключевых преимуществ, условия, призыв к действию, контакты.`},

  {id:'coordinator', name:'Координатор', icon:'🤝', color:'#7fff7f',
   desc:'финальная сборка',
   prompt:(task,p)=>`Ты проджект менеджер. Задача: "${task}".
Команда завершила работу. Напиши финальный отчёт (250 слов): что сделано, структура лендинга, использованные технологии, как запустить, следующие шаги для клиента.`},
];

let agentStates={}, agentStatus={}, results={}, running=false;
let generatedHTML='', generatedTopic='';
AGENTS.forEach(a=>{agentStates[a.id]='idle'; agentStatus[a.id]=a.desc;});

// ═══════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['setup','team','log','result'][i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ═══════════════════════════════════════════════════
//  OFFICE CANVAS
// ═══════════════════════════════════════════════════
const canvas=document.getElementById('officeCanvas');
const ctx=canvas.getContext('2d');
let W=800,H=500;

function resize(){
  const wrap=canvas.parentElement;
  canvas.width=W=wrap.clientWidth;
  canvas.height=H=wrap.clientHeight;
}
resize(); window.addEventListener('resize',resize);

// Desk positions (normalized)
const DESKS=[
  {x:.12,y:.22}, // seo - boss
  {x:.28,y:.50}, // copywriter
  {x:.44,y:.50}, // designer
  {x:.60,y:.50}, // analyst
  {x:.76,y:.50}, // developer
  {x:.20,y:.76}, // seo_tech
  {x:.38,y:.76}, // support
  {x:.56,y:.76}, // pdf
  {x:.75,y:.24}, // coordinator
];

function drawOffice(){
  // Floor — wood texture simulation
  for(let y=0;y<H;y+=20)for(let x=0;x<W;x+=40){
    const v=(x+y)%3;
    ctx.fillStyle=v===0?'#2a1a0a':v===1?'#251608':'#221405';
    ctx.fillRect(x,y,40,20);
  }
  // Subtle grid
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=.5;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Top wall
  ctx.fillStyle='#0f0f2a';
  ctx.fillRect(0,0,W,H*.08);
  // Wall decoration — windows
  [.2,.5,.8].forEach(p=>{
    const wx=W*p-30,wy=4,ww=60,wh=H*.07-4;
    ctx.fillStyle='#0a0a20';ctx.fillRect(wx,wy,ww,wh);
    // Window panes
    [[0,0],[1,0],[0,1],[1,1]].forEach(([dx,dy])=>{
      const px=wx+3+dx*(ww/2-4),py=wy+3+dy*(wh/2-3),pw=ww/2-6,ph=wh/2-5;
      ctx.fillStyle='#112244';ctx.fillRect(px,py,pw,ph);
      ctx.fillStyle='rgba(100,180,255,0.15)';ctx.fillRect(px,py,pw,ph);
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(px,py,4,3);
    });
    ctx.strokeStyle='#1a3a6a';ctx.lineWidth=1;
    ctx.strokeRect(wx,wy,ww,wh);
  });

  // Plants
  [[.03,.08],[.97,.08],[.03,.92],[.97,.92],[.5,.04]].forEach(([px,py])=>{
    const x=W*px,y=H*py;
    drawPlant(x,y);
  });

  // Meeting area — rug
  ctx.fillStyle='rgba(30,20,60,0.6)';
  ctx.fillRect(W*.82,H*.35,W*.15,H*.35);
  ctx.strokeStyle='#3a2a6a';ctx.lineWidth=1;
  ctx.strokeRect(W*.82,H*.35,W*.15,H*.35);
  // Sofa hint
  ctx.fillStyle='#3a2a5a';
  ctx.fillRect(W*.83,H*.36,W*.13,H*.08);
  ctx.fillStyle='#2a1a4a';
  ctx.fillRect(W*.83,H*.56,W*.13,H*.08);

  // Boss area highlight
  ctx.fillStyle='rgba(255,204,0,0.04)';
  ctx.fillRect(W*.03,H*.08,W*.2,H*.3);
  ctx.strokeStyle='rgba(255,204,0,0.2)';ctx.lineWidth=1;
  ctx.strokeRect(W*.03,H*.08,W*.2,H*.3);

  // Bookshelf on wall
  [.15,.45,.7].forEach(bx=>{
    ctx.fillStyle='#1a0a04';ctx.fillRect(W*bx-24,4,48,H*.06);
    [0,1,2,3,4,5].forEach(i=>{
      const bc=['#3a1a1a','#1a3a1a','#1a1a3a','#3a2a1a','#2a1a3a','#1a2a3a'][i];
      ctx.fillStyle=bc;ctx.fillRect(W*bx-22+i*8,6,6,H*.05);
    });
  });
}

function drawPlant(x,y){
  ctx.fillStyle='#2a1505';ctx.fillRect(x-5,y,10,8);
  ctx.fillStyle='#0a3a0a';ctx.fillRect(x-8,y-12,16,14);
  ctx.fillStyle='#0d5a0d';ctx.fillRect(x-5,y-20,10,10);
  ctx.fillStyle='#116611';ctx.fillRect(x-11,y-9,7,10);
  ctx.fillStyle='#0d5a0d';ctx.fillRect(x+4,y-9,7,10);
}

function drawDesk(x,y,agentId){
  const state=agentStates[agentId]||'idle';
  const a=AGENTS.find(a=>a.id===agentId);

  // Desk shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(x-18,y+22,36,6);

  // Desk body
  ctx.fillStyle='#4a2e10';ctx.fillRect(x-20,y+8,40,18);
  ctx.fillStyle='#6a4520';ctx.fillRect(x-20,y+2,40,8);
  ctx.fillStyle='#5a3818';ctx.fillRect(x-20,y+2,40,2);

  // Desk legs
  ctx.fillStyle='#3a2008';
  ctx.fillRect(x-18,y+26,4,8);ctx.fillRect(x+14,y+26,4,8);

  // Chair
  ctx.fillStyle='#1a1a2a';ctx.fillRect(x-7,y+28,14,10);
  ctx.fillStyle='#2a2a3a';ctx.fillRect(x-7,y+24,14,6);

  // Monitor
  ctx.fillStyle='#111';ctx.fillRect(x-9,y-6,18,14);
  ctx.fillStyle='#0d0d1a';ctx.fillRect(x-8,y-5,16,12);

  // Screen
  const sc=state==='active'?a?.color||'#00ffaa':state==='done'?'#004422':state==='error'?'#440000':'#0a0a1a';
  ctx.fillStyle=sc;ctx.fillRect(x-7,y-4,14,10);

  if(state==='active'){
    // Code lines on screen
    const t=Date.now();
    [0,1,2].forEach(i=>{
      const w=4+((t/200+i*3)%8);
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.fillRect(x-5,y-3+i*3,w,1);
    });
    // Glow
    ctx.fillStyle=`${a?.color||'#00ffaa'}22`;
    ctx.fillRect(x-14,y-10,28,24);
  }
  if(state==='done'){
    ctx.fillStyle='#00ff8855';
    ctx.fillRect(x-14,y-10,28,24);
    // Check mark
    ctx.fillStyle='#00ff88';ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillText('✓',x,y+2);
  }

  // Monitor stand
  ctx.fillStyle='#222';ctx.fillRect(x-2,y+8,4,4);ctx.fillRect(x-5,y+10,10,2);

  // Items on desk
  ctx.fillStyle='#2a3a2a';ctx.fillRect(x+8,y+4,6,4); // notepad
  ctx.fillStyle='#1a2a1a';ctx.fillRect(x+9,y+5,4,2);
  ctx.fillStyle='#3a1a1a';ctx.fillRect(x-14,y+4,4,6); // mug
  ctx.fillStyle='#5a2a1a';ctx.fillRect(x-13,y+3,2,1);

  // Name
  if(a){
    ctx.font='6px monospace';ctx.textAlign='center';
    ctx.fillStyle=state==='idle'?'#334':'#667';
    ctx.fillText(a.name.slice(0,10),x,y+46);
  }
}

function drawChar(x,y,agentId){
  const state=agentStates[agentId]||'idle';
  const a=AGENTS.find(a=>a.id===agentId);
  const c=a?.color||'#888';
  const bob=state==='active'?(Math.floor(Date.now()/180)%2?-1:0):0;
  const yy=y+bob;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(x-5,y+16,10,2);

  // Legs
  ctx.fillStyle=state==='idle'?'#1a1a2a':'#2a2a3a';
  ctx.fillRect(x-4,yy+12,3,5);ctx.fillRect(x+2,yy+12,3,5);
  ctx.fillStyle='#1a1010';ctx.fillRect(x-4,yy+16,3,2);ctx.fillRect(x+2,yy+16,3,2);

  // Body
  ctx.fillStyle=state==='idle'?'#1a1a3a':c;
  ctx.fillRect(x-5,yy+3,10,10);
  // Collar
  ctx.fillStyle=state==='idle'?'#2a2a4a':'rgba(255,255,255,0.3)';
  ctx.fillRect(x-2,yy+3,4,2);

  // Arms
  const al=state==='active'?(Math.floor(Date.now()/130)%2?1:-1):0;
  ctx.fillStyle=state==='idle'?'#1a1a3a':c;
  ctx.fillRect(x-7,yy+4+al,3,6);
  ctx.fillRect(x+5,yy+4-al,3,6);

  // Neck
  ctx.fillStyle='#e8c080';ctx.fillRect(x-2,yy+1,4,3);

  // Head
  ctx.fillStyle=state==='idle'?'#1a1a2a':'#f0cc88';
  ctx.fillRect(x-4,yy-7,8,9);

  // Hair
  ctx.fillStyle=state==='idle'?'#0d0d1a':c;
  ctx.fillRect(x-4,yy-8,8,3);
  ctx.fillRect(x-5,yy-7,2,4);
  ctx.fillRect(x+4,yy-7,2,4);

  // Eyes
  if(state!=='idle'){
    ctx.fillStyle='#1a0a0a';
    ctx.fillRect(x-3,yy-5,2,2);ctx.fillRect(x+2,yy-5,2,2);
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillRect(x-3,yy-5,1,1);ctx.fillRect(x+2,yy-5,1,1);
    // Mouth
    ctx.fillStyle=state==='done'?'#00ff88':state==='error'?'#ff4444':'#cc6644';
    if(state==='done') ctx.fillRect(x-2,yy-1,4,1);
    else ctx.fillRect(x-1,yy-1,2,1);
  }

  // Active glow
  if(state==='active'){
    ctx.fillStyle=c+'33';ctx.fillRect(x-8,yy-10,16,30);
  }
  if(state==='done'){
    ctx.fillStyle='#00ff8822';ctx.fillRect(x-8,yy-10,16,30);
    // Star
    ctx.fillStyle='#ffff44';ctx.font='8px sans-serif';ctx.textAlign='center';
    ctx.fillText('★',x,yy-12);
  }
}

function drawSpeechBubble(x,y,text,color){
  const maxW=120, lh=9, pad=5;
  const words=text.split(' ');
  const lines=[]; let cur='';
  words.forEach(w=>{
    if((cur+w).length*5>maxW-pad*2){lines.push(cur.trim());cur=w+' ';}
    else cur+=w+' ';
  });
  if(cur.trim())lines.push(cur.trim());
  const bw=Math.min(maxW,lines.reduce((m,l)=>Math.max(m,l.length*5),40)+pad*2);
  const bh=lines.length*lh+pad*2;
  const bx=x-bw/2, by=y-bh-12;

  ctx.fillStyle='rgba(10,10,20,0.95)';
  ctx.strokeStyle=color||'#00ff88';ctx.lineWidth=1;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(bx,by,bw,bh,3);
  else ctx.rect(bx,by,bw,bh);
  ctx.fill();ctx.stroke();

  ctx.fillStyle='rgba(10,10,20,0.95)';
  ctx.beginPath();ctx.moveTo(x-3,by+bh);ctx.lineTo(x+3,by+bh);ctx.lineTo(x,by+bh+5);ctx.fill();
  ctx.strokeStyle=color||'#00ff88';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x-3,by+bh);ctx.lineTo(x,by+bh+5);ctx.lineTo(x+3,by+bh);ctx.stroke();

  ctx.fillStyle='#cceedd';ctx.font='6px monospace';ctx.textAlign='left';
  lines.forEach((l,i)=>ctx.fillText(l,bx+pad,by+pad+7+i*lh));
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawOffice();
  AGENTS.forEach((a,i)=>{
    const d=DESKS[i];
    if(!d)return;
    const x=Math.round(W*d.x), y=Math.round(H*d.y);
    drawDesk(x,y,a.id);
    drawChar(x,y-12,a.id);
    const state=agentStates[a.id];
    if(state==='active'){
      const msg=agentStatus[a.id]||'работаю...';
      drawSpeechBubble(x,y-20,msg.slice(0,40),a.color);
    }
    if(state==='done'&&Math.floor(Date.now()/3000)%AGENTS.length===i){
      drawSpeechBubble(x,y-20,'Готово! ✓',a.color);
    }
  });
  requestAnimationFrame(render);
}
render();

renderAgentsList();

function setAgentState(id,state,status){
  agentStates[id]=state;
  if(status) agentStatus[id]=status;
  const dot=document.getElementById('dot-'+id);
  if(dot){dot.className='agent-dot dot-'+state;}
  const st=document.getElementById('astatus-'+id);
  if(st) st.textContent=agentStatus[id]||AGENTS.find(a=>a.id===id)?.desc||'';
}

function clickAgent(id){
  if(results[id]){
    switchTab('result');
    document.getElementById('resultSection').style.display='flex';
    document.getElementById('resultText').textContent=results[id];
  }
}

// ═══════════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════════
async function callGroq(k,m,p){
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify({model:m,max_tokens:2000,messages:[{role:'user',content:p}]})});
  const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.statusText);
  return d.choices[0].message.content;
}
async function callOR(k,p){
  const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify({model:'meta-llama/llama-3.2-3b-instruct:free',max_tokens:2000,messages:[{role:'user',content:p}]})});
  const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.statusText);
  return d.choices[0].message.content;
}
async function callMistral(k,p){
  const r=await fetch('https://api.mistral.ai/v1/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify({model:'mistral-small-latest',max_tokens:2000,messages:[{role:'user',content:p}]})});
  const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.statusText);
  return d.choices[0].message.content;
}
async function callOllama(url,p){
  const r=await fetch(url+'/api/chat',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'llama3.2',stream:false,messages:[{role:'user',content:p}]})});
  const d=await r.json();if(!r.ok)throw new Error(d.error||r.statusText);
  return d.message?.content||'';
}

async function callFallback(prompt){
  const gk=document.getElementById('groqKey').value.trim();
  const ok=document.getElementById('orKey').value.trim();
  const mk=document.getElementById('mistralKey').value.trim();
  const ou=document.getElementById('ollamaUrl').value.trim();
  const gm=document.getElementById('groqModel').value;
  const list=[];
  if(gk) list.push({n:'Groq',fn:()=>callGroq(gk,gm,prompt)});
  if(ok) list.push({n:'OpenRouter',fn:()=>callOR(ok,prompt)});
  if(mk) list.push({n:'Mistral',fn:()=>callMistral(mk,prompt)});
  if(ou) list.push({n:'Ollama',fn:()=>callOllama(ou,prompt)});
  if(!list.length) throw new Error('Добавь API ключ (Groq бесплатно)');
  for(const p of list){
    try{
      addLog('→ '+p.n+'...','ln');
      document.getElementById('modelPill').textContent=p.n;
      const r=await p.fn(); addLog('✓ '+p.n,'ls'); return r;
    }catch(e){
      const m=e.message.toLowerCase();
      if(m.includes('429')||m.includes('rate')||m.includes('quota')||m.includes('limit')||m.includes('credit'))
        addLog('✗ '+p.n+': лимит → след.','lw');
      else addLog('✗ '+p.n+': '+e.message.slice(0,30),'le');
    }
  }
  throw new Error('Все провайдеры недоступны');
}

// ═══════════════════════════════════════════════════
//  RUN
// ═══════════════════════════════════════════════════
function setProgress(pct,label){
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=label;
}
function addLog(text,cls){
  const el=document.getElementById('logBox');
  const d=document.createElement('div');
  if(cls)d.className=cls;
  const t=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent=t+' '+text;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  if(el.children.length>200)el.removeChild(el.firstChild);
}
function setPill(text,cls){
  const p=document.getElementById('statusPill');
  p.textContent=text;p.className='pill pill-'+cls;
}

async function runAll(){
  if(running)return;
  const task=document.getElementById('taskInput').value.trim();
  if(!task){alert('Введи задание!');return;}
  const gk=document.getElementById('groqKey').value.trim();
  const ok=document.getElementById('orKey').value.trim();
  const mk=document.getElementById('mistralKey').value.trim();
  const ou=document.getElementById('ollamaUrl').value.trim();
  if(!gk&&!ok&&!mk){
    if(!ou){alert('Добавь API ключ!\nGroq — бесплатно на console.groq.com');return;}
  }

  running=true;results={};generatedHTML='';generatedTopic=task;
  document.getElementById('runBtn').disabled=true;
  document.getElementById('resultArea')&&(document.getElementById('resultArea').style.display='none');
  AGENTS.forEach(a=>setAgentState(a.id,'idle',a.desc));
  setProgress(0,'// SEO МЕНЕДЖЕР АНАЛИЗИРУЕТ ЗАДАЧУ...');
  setPill('РАБОТАЕМ','y');
  addLog('Задача: '+task.slice(0,60),'ln');
  switchTab('team');

  for(let i=0;i<AGENTS.length;i++){
    const a=AGENTS[i];
    setAgentState(a.id,'active','думаю...');
    setProgress(i/AGENTS.length*90,'// '+a.name.toUpperCase()+' ('+(i+1)+'/'+AGENTS.length+')');
    addLog(a.icon+' '+a.name+' начал','ln');
    try{
      const text=await callFallback(a.prompt(task,results));
      results[a.id]=text;
      // Extract HTML if developer
      if(a.id==='developer'){
        const htmlMatch=text.match(/<!DOCTYPE html[\s\S]*<\/html>/i);
        if(htmlMatch) generatedHTML=htmlMatch[0];
        else if(text.includes('<html')||text.includes('<body')) generatedHTML=text;
      }
      setAgentState(a.id,'done','✓ задача выполнена');
      addLog(a.icon+' '+a.name+' → готово','ls');
    }catch(e){
      setAgentState(a.id,'error','ошибка: '+e.message.slice(0,25));
      addLog(a.icon+' ОШИБКА: '+e.message.slice(0,50),'le');
      running=false;document.getElementById('runBtn').disabled=false;
      setProgress(0,'// ОШИБКА');setPill('ОШИБКА','r');return;
    }
  }

  setProgress(100,'// ЛЕНДИНГ ГОТОВ ★');
  setPill('ГОТОВО','g');
  addLog('★ Команда завершила работу!','ls');
  if(generatedHTML) addLog('🌐 Лендинг создан! Открой вкладку РЕЗУЛЬТАТ','ls');

  switchTab('result');
  document.getElementById('resultSection').style.display='flex';
  document.getElementById('resultText').textContent=results.coordinator||'';
  running=false;document.getElementById('runBtn').disabled=false;
}

function resetAll(){
  running=false;results={};generatedHTML='';
  document.getElementById('runBtn').disabled=false;
  document.getElementById('logBox').innerHTML='';
  setProgress(0,'// STANDBY');setPill('STANDBY','g');
  AGENTS.forEach(a=>setAgentState(a.id,'idle',a.desc));
  closeLanding();
  switchTab('setup');
}

async function testConn(){
  addLog('Проверяю подключение...','ln');
  switchTab('log');
  try{const r=await callFallback('Ответь одним словом на русском: привет');addLog('✓ Работает! Ответ: '+r.slice(0,30),'ls');}
  catch(e){addLog('✗ Ошибка: '+e.message,'le');}
}

// ═══════════════════════════════════════════════════
function showLanding(){
  if(!generatedHTML){alert('Лендинг ещё не создан — запусти команду!');return;}
  const wrap=canvas.parentElement;
  canvas.style.display='none';
  const prev=document.getElementById('landingPreview');
  prev.style.display='flex';
  const frame=document.getElementById('landingFrame');
  const blob=new Blob([generatedHTML],{type:'text/html;charset=utf-8'});
  frame.src=URL.createObjectURL(blob);
}

function closeLanding(){
  canvas.style.display='block';
  document.getElementById('landingPreview').style.display='none';
}

function downloadLanding(){
  if(!generatedHTML){alert('Лендинг не создан!');return;}
  const blob=new Blob([generatedHTML],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(generatedTopic||'landing').slice(0,30).replace(/\s/g,'_')+'.html';
  a.click();
  addLog('Лендинг скачан!','ls');
}

function copyResult(){
  navigator.clipboard.writeText(document.getElementById('resultText').textContent)
    .then(()=>addLog('Скопировано','ls'));
}
function saveResult(){
  const t=document.getElementById('resultText').textContent;
  const b=new Blob([t],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='report.txt';a.click();
}
